name: linkcheck

on:
  schedule:
    - cron: "0 18 1 * *" # 毎月1日 18:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 data/linkcheck.py
      - name: Upload linkcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkcheck-report
          path: docs/linkcheck-report.md
