name: refresh-metadata

# companion repo の star/鮮度・被引用数を定期更新し、README/調査ノートを再生成する。
on:
  schedule:
    - cron: "0 18 * * 0"   # 毎週日曜 18:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enrich + generate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 data/enrich.py
          python3 data/gen.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: refresh metadata (citations / repo freshness)"
            git push
          else
            echo "no changes"
          fi
